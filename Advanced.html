<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Search</title>
  </head>
  <body>
    <div id="mainContainer">
      <div id="navbar">
        <a href="./index.html">
          <button>Home</button>
        </a>
      </div>
      <div id="container">
        <form action="https://google.com/search">
          <img
            src="./googlelogo_color_272x92dp.png"
            alt="google_search_pic"
            class="Logo"
          />
          <div id="">
            <input
              type="text"
              name="as_q"
              id="searchAdvanced"
              placeholder="all these words:"
            /><br />
            <input
              type="text"
              name="as_epq"
              id="searchAdvanced"
              placeholder="this exact word or phrase:"
            /><br />
            <input
              type="text"
              name="as_oq"
              id="searchAdvanced"
              placeholder="any of this words:"
            /><br />
            <input
              type="text"
              name="as_eq"
              id="searchAdvanced"
              placeholder="none of these words:"
            /><br />
          </div>
          <div>
            <!-- <center>
              <input type="submit" value="Google Search" />
            </center> -->
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
